<head>

  <meta name="theme-color" content="#FF8C42">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小深">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><ellipse cx='100' cy='110' rx='55' ry='50' fill='%23FF8C42'/><polygon points='55,70 75,20 95,65' fill='%23E06B2A'/><polygon points='145,70 125,20 105,65' fill='%23E06B2A'/><ellipse cx='100' cy='125' rx='35' ry='30' fill='%23FFE4C4'/><ellipse cx='78' cy='95' rx='10' ry='12' fill='white'/%><ellipse cx='122' cy='95' rx='10' ry='12' fill='white'/%><ellipse cx='80' cy='94' rx='5' ry='6' fill='%23333'/><ellipse cx='120' cy='94' rx='5' ry='6' fill='%23333'/><ellipse cx='100' cy='112' rx='5' ry='4' fill='%23333'/><path d='M90,120 Q100,132 110,120' fill='none' stroke='%23333' stroke-width='2.5'/></svg>">
  <link rel="manifest" href="/manifest.json">
  <title>小深 - AI 小伙伴</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app"><div class="loading-screen"><div class="loading-fox">🦊</div><div class="loading-text">正在加载小深...</div><div id="err-msg" style="color:red;font-size:0.75em;max-width:280px;text-align:center;word-break:break-all;display:none;"></div></div></div>

  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
  // Catch module load errors
  window.onerror = function(msg, src, line, col, err) {
    var el = document.getElementById('err-msg');
    if (el) { el.style.display = 'block'; el.textContent = 'JS错误: ' + msg + ' | ' + src; }
    return false;
  };
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
